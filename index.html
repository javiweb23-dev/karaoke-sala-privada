<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control VIP - MiKaraokeLatino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .portada-slot img { transition: opacity 0.35s ease-out; }
    </style>
    <script src="canciones.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans select-none relative">

    <div id="nameModal" class="fixed inset-0 bg-black/90 z-[100] flex flex-col justify-center items-center p-6 hidden">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-amber-400 mb-2">¡Bienvenido!</h2>
            <p class="text-zinc-400 text-sm mb-6">Ingresa tu nombre para pedir canciones</p>
            <input type="text" id="userNameInput" placeholder="Ej: María, Carlos..." class="w-full bg-zinc-950 border border-zinc-700 rounded-xl py-3 px-4 text-white font-bold text-center mb-4 focus:outline-none focus:border-amber-500">
            <button onclick="guardarNombre()" class="w-full bg-amber-500 text-black font-black py-3 rounded-xl active:scale-95 transition-all">ENTRAR A LA SALA</button>
        </div>
    </div>

    <div id="statusAlert" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm z-[200] rounded-xl p-4 text-center text-sm font-bold shadow-2xl transition-all duration-300 opacity-0 pointer-events-none translate-y-4"></div>

    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50 w-full">
        <div class="max-w-md mx-auto px-4 py-3 flex flex-col items-center justify-center gap-1.5">
            <img src="logo.png" alt="Mi Karaoke Latino" class="h-16 w-auto max-w-[85%] object-contain">
            <p id="displayNombre" class="text-xs text-zinc-400 text-center tracking-wide">Cantante: -</p>
        </div>
    </header>

    <main class="flex-1 max-w-md w-full mx-auto p-4 flex flex-col gap-4">
        
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4">
            <h3 class="text-zinc-400 text-xs font-bold mb-2 uppercase tracking-wider">Canciones en Cola</h3>
            <div id="liveQueue" class="flex flex-col gap-1 text-sm text-zinc-300">
                <p class="text-zinc-600 italic">No hay canciones en espera.</p>
            </div>
        </div>

        <div class="relative">
            <input type="text" id="searchBar" placeholder="Busca artista, canción, género o idioma..." 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-xl py-3.5 px-4 pl-11 text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-amber-500 transition-all text-base">
            <span class="absolute left-4 top-3.5 text-zinc-500">🔍</span>
        </div>

        <div class="flex-1 flex flex-col gap-2 overflow-y-auto pb-6" id="songList"></div>
    </main>

    <script>
        const SUPABASE_URL = "https://mefrjbmjfdphdqndpzcw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let miNombre = localStorage.getItem('karaoke_nombre');
        let cancionesPopulares = [];

        if (!miNombre) {
            document.getElementById('nameModal').classList.remove('hidden');
        } else {
            document.getElementById('displayNombre').innerText = `Cantante: ${miNombre}`;
        }

        function guardarNombre() {
            const input = document.getElementById('userNameInput').value.trim();
            if (input.length > 1) {
                miNombre = input.toUpperCase();
                localStorage.setItem('karaoke_nombre', miNombre);
                document.getElementById('displayNombre').innerText = `Cantante: ${miNombre}`;
                document.getElementById('nameModal').classList.add('hidden');
            }
        }

        const cachePortadas = new Map();
        const pendientesPortadas = new Map();

        function identificadorPortada(song) {
            return `${song.artista} - ${song.titulo}`.toUpperCase();
        }

        async function consultarPortadaCache(identificador) {
            const { data, error } = await supabaseClient
                .from('portadas_cache')
                .select('url')
                .eq('identificador', identificador)
                .maybeSingle();
            if (error) {
                console.error("Error en Supabase:", error);
                return undefined;
            }
            if (!data) return undefined;
            return data.url;
        }

        async function guardarPortadaCache(identificador, url) {
            const { error } = await supabaseClient
                .from('portadas_cache')
                .upsert(
                    { identificador: identificador, url: url },
                    { onConflict: 'identificador' }
                );
            if (error) console.error("Error en Supabase:", error);
        }

        function htmlFallbackPortada() {
            return `<div class="w-16 h-16 rounded-lg bg-gradient-to-tr from-zinc-800 to-zinc-700 flex items-center justify-center shadow-md border border-zinc-600/50"><span class="text-2xl text-amber-400 drop-shadow-md" aria-hidden="true">🎤</span></div>`;
        }

        async function obtenerPortadaItunes(song) {
            const identificador = identificadorPortada(song);
            if (cachePortadas.has(identificador)) return cachePortadas.get(identificador);
            if (pendientesPortadas.has(identificador)) return pendientesPortadas.get(identificador);

            const promesa = (async () => {
                const urlCache = await consultarPortadaCache(identificador);
                if (urlCache !== undefined) {
                    if (urlCache === 'no_encontrado') return null;
                    return urlCache;
                }

                try {
                    const term = encodeURIComponent(`${song.artista} ${song.titulo}`);
                    const res = await fetch(`https://itunes.apple.com/search?term=${term}&entity=song&limit=1`);
                    if (!res.ok) {
                        await guardarPortadaCache(identificador, 'no_encontrado');
                        return null;
                    }
                    const json = await res.json();
                    const urlItunes = json.results?.[0]?.artworkUrl100 || null;
                    if (urlItunes) {
                        await guardarPortadaCache(identificador, urlItunes);
                        return urlItunes;
                    }
                    await guardarPortadaCache(identificador, 'no_encontrado');
                    return null;
                } catch {
                    await guardarPortadaCache(identificador, 'no_encontrado');
                    return null;
                }
            })();

            pendientesPortadas.set(identificador, promesa);
            const url = await promesa;
            pendientesPortadas.delete(identificador);
            cachePortadas.set(identificador, url);
            return url;
        }

        async function cargarPortadaLazy(portadaSlot, song) {
            const url = await obtenerPortadaItunes(song);
            if (!portadaSlot?.isConnected) return;

            if (!url) return;

            const img = new Image();
            img.alt = '';
            img.className = 'w-16 h-16 rounded-lg object-cover shadow-md border border-zinc-700/40 opacity-0';

            await new Promise(resolve => {
                img.onload = resolve;
                img.onerror = resolve;
                img.src = url;
                if (img.complete) resolve();
            });

            if (!portadaSlot.isConnected) return;

            portadaSlot.innerHTML = '';
            portadaSlot.appendChild(img);
            requestAnimationFrame(() => img.classList.replace('opacity-0', 'opacity-100'));
        }

        const observerPortadas = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (!entry.isIntersecting) return;

                const card = entry.target;
                if (card.dataset.portadaProcesada === 'true') {
                    observerPortadas.unobserve(card);
                    return;
                }

                const song = {
                    artista: card.dataset.artista,
                    titulo: card.dataset.titulo
                };
                const portadaSlot = card.querySelector('[data-portada]');

                cargarPortadaLazy(portadaSlot, song).finally(() => {
                    card.dataset.portadaProcesada = 'true';
                    observerPortadas.unobserve(card);
                });
            });
        }, { root: null, rootMargin: '100px', threshold: 0.05 });

        async function cargarCancionesPopulares() {
            const { data, error } = await supabaseClient
                .from('canciones_populares')
                .select('identificador')
                .gte('total_pedidos', 10);

            if (error) {
                console.warn('No se pudieron cargar canciones populares:', error);
                cancionesPopulares = [];
                return;
            }

            cancionesPopulares = (data || []).map(fila => fila.identificador);
        }

        function esCancionPopular(titulo, artista) {
            return cancionesPopulares.includes(`${titulo} - ${artista}`);
        }

        function cargarCanciones(lista) {
            const songList = document.getElementById('songList');
            songList.innerHTML = '';
            
            if (lista.length === 0) {
                songList.innerHTML = `<p class="text-center text-zinc-600 italic py-6">No se encontraron resultados</p>`;
                return;
            }

            lista.forEach(song => {
                const nombreFormateado = `${song.artista.toUpperCase()} - ${song.titulo.toUpperCase()}`;
                const estrellaPopular = esCancionPopular(song.titulo, song.artista) ? '<span class="shrink-0 text-amber-400 text-sm">⭐</span>' : '';
                const card = document.createElement('div');
                card.className = 'cancion-card bg-zinc-900/90 border border-zinc-800/90 hover:border-zinc-600 p-4 rounded-2xl flex items-center gap-4 transition-all shadow-sm';
                card.dataset.artista = song.artista;
                card.dataset.titulo = song.titulo;

                const portada = document.createElement('div');
                portada.className = 'portada-slot flex-shrink-0 w-16 h-16';
                portada.dataset.portada = 'true';
                portada.innerHTML = htmlFallbackPortada();

                const info = document.createElement('div');
                info.className = 'flex-1 min-w-0 pr-1';
                info.innerHTML = `
                    <h3 class="font-semibold text-zinc-50 text-[15px] leading-snug tracking-tight flex items-center gap-1.5 min-w-0">
                        <span class="truncate">${song.titulo}</span>${estrellaPopular}
                    </h3>
                    <p class="text-[13px] text-zinc-400 mt-1 mb-2.5 truncate font-medium tracking-wide">${song.artista}</p>
                    <div class="flex flex-wrap gap-1.5">
                        <span class="text-[10px] uppercase tracking-widest bg-zinc-800/80 border border-zinc-700/80 text-zinc-400 px-2.5 py-0.5 rounded-full font-medium">${song.genero}</span>
                        <span class="text-[10px] uppercase tracking-widest bg-zinc-800/80 border border-zinc-700/80 text-zinc-400 px-2.5 py-0.5 rounded-full font-medium">${song.idioma}</span>
                    </div>
                `;

                const btn = document.createElement('button');
                btn.className = 'flex-shrink-0 bg-zinc-800 hover:bg-amber-500 hover:text-black text-amber-400 font-bold px-5 py-3 rounded-xl text-sm active:scale-95 transition-all shadow-sm';
                btn.textContent = 'Pedir';
                btn.onclick = () => pedirCancion(nombreFormateado, song.titulo, song.artista);

                card.appendChild(portada);
                card.appendChild(info);
                card.appendChild(btn);
                songList.appendChild(card);

                observerPortadas.observe(card);
            });
        }

        document.getElementById('searchBar').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            // cancionesREAL viene del archivo externo canciones.js automáticamente
            const filtradas = cancionesREAL.filter(c => 
                c.artista.toLowerCase().includes(q) || 
                c.titulo.toLowerCase().includes(q) ||
                (c.genero && c.genero.toLowerCase().includes(q)) ||
                (c.idioma && c.idioma.toLowerCase().includes(q))
            );
            cargarCanciones(filtradas);
        });

        async function actualizarCola() {
            const { data } = await supabaseClient.from('Solicitudes').select('cancion_info, nombre_usuario').eq('estado', 'pendiente').order('id', { ascending: true });
            const liveQueue = document.getElementById('liveQueue');
            if (!data || data.length === 0) {
                liveQueue.innerHTML = `<p class="text-zinc-600 italic">No hay canciones en espera.</p>`;
                return;
            }
            const MAX_COLA = 6;
            const visibles = data.slice(0, MAX_COLA);
            const restantes = data.length - MAX_COLA;
            let html = visibles.map((s, i) => `<div class="truncate"><span class="text-amber-500 font-bold mr-1">${i + 1}.</span> ${s.cancion_info} <span class="text-zinc-500 text-xs">(${s.nombre_usuario})</span></div>`).join('');
            if (restantes > 0) {
                const etiqueta = restantes === 1 ? 'canción' : 'canciones';
                html += `<p class="text-zinc-500 text-xs italic mt-2 pt-2 border-t border-zinc-800 text-center">...y ${restantes} ${etiqueta} más en cola</p>`;
            }
            liveQueue.innerHTML = html;
        }

        async function registrarPopularidad(titulo, artista) {
            const identificador = `${titulo} - ${artista}`;

            const { data: existente, error: errorConsulta } = await supabaseClient
                .from('canciones_populares')
                .select('total_pedidos')
                .eq('identificador', identificador)
                .maybeSingle();

            if (errorConsulta) {
                console.warn('No se pudo consultar canciones_populares:', errorConsulta);
                return;
            }

            if (existente) {
                await supabaseClient
                    .from('canciones_populares')
                    .update({ total_pedidos: existente.total_pedidos + 1 })
                    .eq('identificador', identificador);
            } else {
                await supabaseClient
                    .from('canciones_populares')
                    .insert({ identificador, total_pedidos: 1 });
            }
        }

        async function pedirCancion(nombreArchivo, titulo, artista) {
            if (!miNombre) return alert("Por favor ingresa tu nombre primero.");

            const { data: dups } = await supabaseClient.from('Solicitudes').select('id').eq('estado', 'pendiente').eq('cancion_info', nombreArchivo);
            if (dups && dups.length > 0) return mostrarAlerta("❌ Esta canción ya está en la cola.", true);

            const { count: misTemas } = await supabaseClient.from('Solicitudes').select('*', { count: 'exact', head: true }).eq('estado', 'pendiente').eq('nombre_usuario', miNombre);
            if (misTemas >= 3) return mostrarAlerta("⚠️ Canta primero las 3 que tienes en cola para seguir pidiendo.", true);

            const { count: totalCola } = await supabaseClient.from('Solicitudes').select('*', { count: 'exact', head: true }).eq('estado', 'pendiente');
            
            const { error } = await supabaseClient.from('Solicitudes').insert([{ nombre_usuario: miNombre, cancion_info: nombreArchivo, estado: 'pendiente' }]);

            if (!error) {
                await registrarPopularidad(titulo, artista);

                if (totalCola === 0) {
                    mostrarAlerta("✅ ¡Enviada! Comenzará en unos segundos.");
                } else {
                    const minsAprox = totalCola * 3;
                    mostrarAlerta(`✅ ¡En cola! Tienes ${totalCola} canción(es) por delante (Aprox ${minsAprox} min).`);
                }
                actualizarCola();
            }
        }

        let alertTimeout;
        function mostrarAlerta(msg, isError = false) {
            const alertBox = document.getElementById('statusAlert');
            alertBox.innerText = msg;
            
            if(isError) {
                alertBox.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm z-[200] rounded-xl p-4 text-center text-sm font-bold shadow-2xl transition-all duration-300 pointer-events-none bg-zinc-900 text-red-400 border-2 border-red-500 shadow-red-500/20";
            } else {
                alertBox.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 w-[90%] max-w-sm z-[200] rounded-xl p-4 text-center text-sm font-bold shadow-2xl transition-all duration-300 pointer-events-none bg-zinc-900 text-emerald-400 border-2 border-emerald-500 shadow-emerald-500/20";
            }

            setTimeout(() => {
                alertBox.classList.remove('opacity-0', 'translate-y-4');
                alertBox.classList.add('opacity-100', 'translate-y-0');
            }, 10);

            clearTimeout(alertTimeout);

            alertTimeout = setTimeout(() => {
                alertBox.classList.remove('opacity-100', 'translate-y-0');
                alertBox.classList.add('opacity-0', 'translate-y-4');
            }, 4000);
        }

        supabaseClient.channel('queue-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'Solicitudes' }, actualizarCola).subscribe();

        async function iniciarPagina() {
            await cargarCancionesPopulares();
            cargarCanciones(cancionesREAL);
            actualizarCola();
        }

        iniciarPagina();
    </script>
</body>
</html>
