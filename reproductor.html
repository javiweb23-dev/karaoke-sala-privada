<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor VIP - Karaoke Box</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: none; }
    </style>
</head>
<body class="flex flex-col justify-center items-center text-white font-sans select-none">

    <div id="activationWall" class="absolute inset-0 bg-zinc-950 flex flex-col justify-center items-center z-50 cursor-pointer">
        <h1 class="text-3xl font-bold text-amber-400 animate-pulse">SALA PRIVADA LISTA</h1>
        <p class="text-zinc-500 mt-2 text-lg">Haz un clic para iniciar el sistema</p>
    </div>

    <div id="lobbyScreen" class="text-center w-full absolute inset-0 flex flex-col justify-center items-center bg-zinc-950 z-40">
        <h2 id="lobbyMessage" class="text-4xl font-extrabold text-zinc-300 tracking-wide">ESPERANDO SOLICITUDES...</h2>
        <h3 id="singerName" class="text-2xl font-bold text-emerald-400 mt-4 hidden"></h3>
        <h1 id="countdownText" class="text-9xl font-black text-amber-400 mt-6 hidden">5</h1>
    </div>

    <video id="karaokePlayer" class="relative z-10"></video>

    <div id="timeCounter" class="fixed bottom-4 right-4 bg-black/60 text-zinc-400 text-xs px-3 py-1.5 rounded-lg font-mono z-50 pointer-events-none hidden">00:00 / 00:00 (Restan: -00:00)</div>

    <div id="bannerProxima" class="fixed top-6 left-1/2 transform -translate-x-1/2 bg-zinc-900/95 border border-zinc-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-3 hidden transition-all duration-500 opacity-0">
        <p id="bannerProximaTexto" class="text-sm font-semibold text-center whitespace-nowrap overflow-hidden text-ellipsis"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://mefrjbmjfdphdqndpzcw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const player = document.getElementById('karaokePlayer');
        const wall = document.getElementById('activationWall');
        const lobbyScreen = document.getElementById('lobbyScreen');
        const lobbyMessage = document.getElementById('lobbyMessage');
        const singerName = document.getElementById('singerName');
        const countdownText = document.getElementById('countdownText');
        const timeCounter = document.getElementById('timeCounter');
        const bannerProxima = document.getElementById('bannerProxima');
        const bannerProximaTexto = document.getElementById('bannerProximaTexto');
        
        let isPlaying = false;
        let systemActive = false;
        let idActual = null;
        let avisoProximaMostrado = false;
        let ocultarAvisoTimeout = null;
        let intentoExtensionAlternativa = false;
        let audioContexto;
        let nodoFuente;
        let ecualizadorBajos;
        let ecualizadorBrillo;
        let preAmp;
        let compressor;

        const efectosSonidos = {
            'aplausos': new Audio('efectos/aplausos.mp3'),
            'buuu': new Audio('efectos/buuu.mp3'),
            'corneta': new Audio('efectos/corneta.mp3'),
            'chacal de la trompeta': new Audio('efectos/chacal.mp3')
        };

        function reproducirEfecto(valor) {
            const audio = efectosSonidos[valor];
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(err => console.warn('No se pudo reproducir efecto:', valor, err));
        }

        function formatTiempo(segundos) {
            if (!isFinite(segundos) || segundos < 0) segundos = 0;
            const m = Math.floor(segundos / 60);
            const s = Math.floor(segundos % 60);
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function ocultarBannerProxima() {
            clearTimeout(ocultarAvisoTimeout);
            bannerProxima.classList.add('opacity-0');
            setTimeout(() => bannerProxima.classList.add('hidden'), 500);
        }

        function mostrarBannerProxima(texto) {
            bannerProximaTexto.innerText = texto;
            bannerProxima.classList.remove('hidden');
            requestAnimationFrame(() => bannerProxima.classList.remove('opacity-0'));
            ocultarAvisoTimeout = setTimeout(ocultarBannerProxima, 6000);
        }

        async function mostrarAvisoProximaCancion() {
            const { data } = await supabaseClient
                .from('Solicitudes')
                .select('cancion_info, nombre_usuario')
                .eq('estado', 'pendiente')
                .order('id', { ascending: true })
                .limit(2);

            if (!data || data.length < 2) return;

            const proxima = data[1];
            mostrarBannerProxima(`📢 PRÓXIMA CANCIÓN: ${proxima.cancion_info} | 🎤 CANTA: ${proxima.nombre_usuario.toUpperCase()}`);
        }

        function manejarErrorVideo(solicitud) {
            const err = player.error;
            if (!err) return;

            if ((err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED || err.code === 4) && !intentoExtensionAlternativa) {
                intentoExtensionAlternativa = true;
                player.src = `videos_locales/${solicitud.cancion_info}.MP4`;
                player.load();
                player.play().catch(e => console.warn('Reintentando con extensión alternativa...', e));
                return;
            }

            const errorCritico = err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED
                || err.code === 4
                || err.code === MediaError.MEDIA_ERR_DECODE
                || err.code === 3;

            if (errorCritico) {
                console.error('Error crítico de reproducción:', err.code);
                marcarComoCompletada(solicitud.id);
            }
        }

        player.addEventListener('timeupdate', () => {
            if (!isPlaying || !player.duration || isNaN(player.duration)) return;

            const transcurrido = player.currentTime;
            const duracion = player.duration;
            const restante = duracion - transcurrido;

            timeCounter.innerText = `${formatTiempo(transcurrido)} / ${formatTiempo(duracion)} (Restan: -${formatTiempo(restante)})`;

            if (!avisoProximaMostrado && restante <= 35 && restante >= 30) {
                avisoProximaMostrado = true;
                mostrarAvisoProximaCancion();
            }
        });

        wall.addEventListener('click', () => {
            systemActive = true;
            wall.style.display = 'none';

            audioContexto = new (window.AudioContext || window.webkitAudioContext)();
            nodoFuente = audioContexto.createMediaElementSource(player);

            ecualizadorBajos = audioContexto.createBiquadFilter();
            ecualizadorBajos.type = 'lowshelf';
            ecualizadorBajos.frequency.setValueAtTime(100, audioContexto.currentTime);
            ecualizadorBajos.gain.value = 4.5;

            ecualizadorBrillo = audioContexto.createBiquadFilter();
            ecualizadorBrillo.type = 'highshelf';
            ecualizadorBrillo.frequency.setValueAtTime(10000, audioContexto.currentTime);
            ecualizadorBrillo.gain.value = 3.0;

            preAmp = audioContexto.createGain();
            preAmp.gain.value = 1.4;

            compressor = audioContexto.createDynamicsCompressor();
            compressor.threshold.value = -6.0;
            compressor.knee.value = 8.0;
            compressor.ratio.value = 20.0;
            compressor.attack.value = 0.001;
            compressor.release.value = 0.08;

            nodoFuente.connect(ecualizadorBajos);
            ecualizadorBajos.connect(ecualizadorBrillo);
            ecualizadorBrillo.connect(preAmp);
            preAmp.connect(compressor);
            compressor.connect(audioContexto.destination);

            if (audioContexto.state === 'suspended') audioContexto.resume();

            buscarSiguienteCancion();
        });

        async function buscarSiguienteCancion() {
            if (!systemActive || isPlaying) return;

            const { data, error } = await supabaseClient
                .from('Solicitudes')
                .select('*')
                .eq('estado', 'pendiente')
                .order('id', { ascending: true })
                .limit(1);

            if (error || !data || data.length === 0) {
                lobbyScreen.style.display = 'flex';
                lobbyMessage.innerText = "ESPERANDO SOLICITUDES...";
                singerName.classList.add('hidden');
                countdownText.classList.add('hidden');
                player.style.display = 'none';
                timeCounter.classList.add('hidden');
                ocultarBannerProxima();
                return;
            }

            iniciarCuentaRegresiva(data[0]);
        }

        function iniciarCuentaRegresiva(solicitud) {
            isPlaying = true; 
            idActual = solicitud.id;
            let segundos = 5;
            
            lobbyScreen.style.display = 'flex';
            lobbyMessage.innerText = `PRÓXIMO TEMA:\n${solicitud.cancion_info}`;
            singerName.innerText = `🎤 LA CANTA: ${solicitud.nombre_usuario.toUpperCase()}`;
            singerName.classList.remove('hidden');
            countdownText.innerText = segundos;
            countdownText.classList.remove('hidden');

            const intervalo = setInterval(() => {
                segundos--;
                if (segundos > 0) {
                    countdownText.innerText = segundos;
                } else {
                    clearInterval(intervalo);
                    countdownText.classList.add('hidden');
                    reproducirVideo(solicitud);
                }
            }, 1000);
        }

        function reproducirVideo(solicitud) {
            avisoProximaMostrado = false;
            intentoExtensionAlternativa = false;
            ocultarBannerProxima();

            lobbyScreen.style.display = 'none';
            player.style.display = 'block';
            timeCounter.classList.remove('hidden');

            const nombreArchivo = solicitud.cancion_info;
            player.src = `videos_locales/${nombreArchivo}.mp4`;
            player.load();

            player.play().catch(() => {
                if (!intentoExtensionAlternativa) {
                    intentoExtensionAlternativa = true;
                    player.src = `videos_locales/${nombreArchivo}.MP4`;
                    player.load();
                    player.play().catch(err => console.warn('Esperando buffer o interacción...', err));
                }
            });

            player.onended = () => {
                if (idActual === solicitud.id) marcarComoCompletada(solicitud.id);
            };

            player.onerror = () => {
                if (idActual === solicitud.id) manejarErrorVideo(solicitud);
            };
        }

        async function marcarComoCompletada(id) {
            if (!id) return;

            await supabaseClient.from('Solicitudes').update({ estado: 'completada' }).eq('id', id);
            isPlaying = false;
            idActual = null;
            avisoProximaMostrado = false;
            ocultarBannerProxima();
            timeCounter.classList.add('hidden');
            player.onended = null;
            player.onerror = null;
            player.src = "";
            buscarSiguienteCancion();
        }

        // Detecta nuevos pedidos
        supabaseClient.channel('cambios-db').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'Solicitudes' }, () => {
            buscarSiguienteCancion();
        }).subscribe();

        // 🎛️ ESCUCHA LOS COMANDOS DEL ADMIN
        supabaseClient.channel('admin-commands').on('broadcast', { event: 'control' }, ({ payload }) => {
            if (payload.accion === 'pausa') {
                player.paused ? player.play() : player.pause();
            } else if (payload.accion === 'reiniciar' && isPlaying) {
                player.currentTime = 0;
                player.play();
            } else if (payload.accion === 'saltar' && isPlaying) {
                marcarComoCompletada(idActual);
            } else if (payload.accion === 'efecto' && payload.valor) {
                reproducirEfecto(payload.valor);
            }
        }).subscribe();
    </script>
</body>
</html>
