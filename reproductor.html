<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor VIP - Karaoke Box</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: contain; display: none; }
    </style>
</head>
<body class="flex flex-col justify-center items-center text-white font-sans select-none">

    <!-- Pantalla de activación por clic -->
    <div id="activationWall" class="absolute inset-0 bg-zinc-950 flex flex-col justify-center items-center z-50 cursor-pointer">
        <h1 class="text-3xl font-bold text-amber-400 animate-pulse">SALA PRIVADA LISTA</h1>
        <p class="text-zinc-500 mt-2 text-lg">Haz un clic para iniciar el sistema</p>
    </div>

    <!-- Lobby / Cuenta regresiva -->
    <div id="lobbyScreen" class="text-center w-full absolute inset-0 flex flex-col justify-center items-center bg-zinc-950 z-40">
        <h2 id="lobbyMessage" class="text-4xl font-extrabold text-zinc-300 tracking-wide">ESPERANDO SOLICITUDES...</h2>
        <h3 id="singerName" class="text-2xl font-bold text-emerald-400 mt-4 hidden"></h3>
        <h1 id="countdownText" class="text-9xl font-black text-amber-400 mt-6 hidden">5</h1>
    </div>

    <!-- Video -->
    <video id="karaokePlayer" class="relative z-10" crossorigin="anonymous" playsinline></video>

    <!-- Contador de tiempo (abajo derecha) -->
    <div id="timeCounter" class="fixed bottom-4 right-4 bg-zinc-950/90 backdrop-blur-sm border border-zinc-700/80 text-zinc-100 text-base font-mono font-black px-4 py-2.5 rounded-xl shadow-lg shadow-black/50 z-50 pointer-events-none hidden tracking-wide">
        00:00 / 00:00 (Restan: -00:00)
    </div>

    <script>
        // ── CONFIGURACIÓN ─────────────────────────────────────────────────
        const SUPABASE_URL = "https://mefrjbmjfdphdqndpzcw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const canalAdmin = supabaseClient.channel('admin-commands');

        // ── REFERENCIAS DOM ───────────────────────────────────────────────
        const player        = document.getElementById('karaokePlayer');
        const wall          = document.getElementById('activationWall');
        const lobbyScreen   = document.getElementById('lobbyScreen');
        const lobbyMessage  = document.getElementById('lobbyMessage');
        const singerName    = document.getElementById('singerName');
        const countdownText = document.getElementById('countdownText');
        const timeCounter   = document.getElementById('timeCounter');

        // ── ESTADO GENERAL ────────────────────────────────────────────────
        let isPlaying               = false;
        let systemActive            = false;
        let sistemaIniciado         = false;
        let idActual                = null;
        let intentoExtensionAlterna = false;

        // ── ESTADO DE AUDIO ───────────────────────────────────────────────
        let audioIniciado      = false;
        let audioContexto      = null;
        let source             = null;
        let gainNormalizacion  = null;
        let analizadorNorm     = null;  // Mide RMS
        let ecualizadorBajos   = null;
        let ecualizadorMedios  = null;
        let ecualizadorBrillo  = null;
        let deEsser            = null;
        let soundTouchNode     = null;
        let SoundTouchNodeClass = null;
        let soundTouchRegistrado = false;
        let compressor         = null;
        let gainFinal          = null;

        // ── ESTADO DE TONO Y NORMALIZACIÓN ───────────────────────────────
        let semitonos           = 0;
        let rampaTonoId         = null;

        function duracionRampaTono(inicio, destino) {
            const salto = Math.abs(destino - inicio);
            return Math.min(800, Math.round(420 + salto * 120));
        }
        let normInterval    = null;
        let medicionesRMS   = [];
        const AUTO_VOL_TARGET_RMS  = 0.095;
        const AUTO_VOL_GAIN_MIN    = 0.5;
        const AUTO_VOL_GAIN_MAX    = 2.2;

        // ── EFECTOS DE SONIDO ─────────────────────────────────────────────
        const efectosSonidos = {
            'aplausos':              new Audio('efectos/aplausos.mp3'),
            'buuu':                  new Audio('efectos/buuu.mp3'),
            'corneta':               new Audio('efectos/corneta.mp3'),
            'chacal de la trompeta': new Audio('efectos/chacal.mp3')
        };

        function reproducirEfecto(valor) {
            const audio = efectosSonidos[valor];
            if (!audio) return;
            audio.currentTime = 0;
            try {
                const p = audio.play();
                if (p && typeof p.catch === 'function') p.catch(() => {});
            } catch (e) {}
        }

        // ── FORMATO DE TIEMPO ─────────────────────────────────────────────
        function formatTiempo(s) {
            if (!isFinite(s) || s < 0) s = 0;
            const m = Math.floor(s / 60);
            const ss = Math.floor(s % 60);
            return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
        }

        async function cargarSoundTouch() {
            if (SoundTouchNodeClass) return SoundTouchNodeClass;

            const localUrl = new URL('lib/soundtouch/SoundTouchNode.js', document.baseURI || window.location.href).href;
            try {
                const mod = await import(localUrl);
                SoundTouchNodeClass = mod.SoundTouchNode;
                console.log('[Audio] SoundTouch cargado desde lib local');
                return SoundTouchNodeClass;
            } catch (eLocal) {
                console.warn('[Audio] lib local no disponible, probando CDN...', eLocal.message);
            }

            const mod = await import('https://cdn.jsdelivr.net/npm/@soundtouchjs/audio-worklet@2.0.3/+esm');
            SoundTouchNodeClass = mod.SoundTouchNode;
            console.log('[Audio] SoundTouch cargado desde CDN');
            return SoundTouchNodeClass;
        }

        function urlProcessorSoundTouch() {
            return new URL('lib/soundtouch-processor.js', document.baseURI || window.location.href).href;
        }

        async function registrarSoundTouch() {
            const STN = await cargarSoundTouch();
            if (!soundTouchRegistrado) {
                await STN.register(audioContexto, urlProcessorSoundTouch());
                soundTouchRegistrado = true;
                console.log('[Audio] SoundTouch processor registrado');
            }
        }

        function obtenerPitchActual() {
            if (!soundTouchNode) return semitonos;
            return soundTouchNode.pitchSemitones.value;
        }

        function aplicarTonoSuave(destino) {
            destino = Math.max(-6, Math.min(6, destino));
            if (!soundTouchNode || !audioContexto) {
                semitonos = destino;
                return;
            }

            const inicio = obtenerPitchActual();
            semitonos = destino;

            if (Math.abs(inicio - destino) < 0.01) {
                soundTouchNode.pitchSemitones.value = destino;
                return;
            }

            if (rampaTonoId !== null) {
                cancelAnimationFrame(rampaTonoId);
                rampaTonoId = null;
            }

            const duracionMs = duracionRampaTono(inicio, destino);
            const param = soundTouchNode.pitchSemitones;
            const t = audioContexto.currentTime;

            if (param && typeof param.cancelScheduledValues === 'function') {
                param.cancelScheduledValues(t);
                param.setValueAtTime(inicio, t);
                param.linearRampToValueAtTime(destino, t + duracionMs / 1000);
                return;
            }

            const t0 = performance.now();
            function animar(ahora) {
                const progreso = Math.min(1, (ahora - t0) / duracionMs);
                const suave = progreso * progreso * (3 - 2 * progreso);
                soundTouchNode.pitchSemitones.value = inicio + (destino - inicio) * suave;
                if (progreso < 1) {
                    rampaTonoId = requestAnimationFrame(animar);
                } else {
                    soundTouchNode.pitchSemitones.value = destino;
                    rampaTonoId = null;
                }
            }
            rampaTonoId = requestAnimationFrame(animar);
        }

        function cambiarTono(delta) {
            aplicarTonoSuave(semitonos + delta);
        }

        function resetTono(notificarAdmin) {
            if (rampaTonoId !== null) {
                cancelAnimationFrame(rampaTonoId);
                rampaTonoId = null;
            }
            aplicarTonoSuave(0);
            if (notificarAdmin) {
                try {
                    canalAdmin.send({
                        type: 'broadcast',
                        event: 'control',
                        payload: { accion: 'sync_tono', valor: 0 }
                    });
                } catch (e) {}
            }
        }

        // ─────────────────────────────────────────────────────────────────
        // NORMALIZACIÓN AUTOMÁTICA DE GANANCIA
        // Mide el RMS real del audio cada 2 segundos.
        // Promedia las últimas 5 mediciones para estabilidad.
        // Aplica corrección con rampa de 3 segundos (sin bombeo).
        // Objetivo tipo cabina: nivel uniforme sin empujar agudos ni saturar.
        // ─────────────────────────────────────────────────────────────────
        async function asegurarAudioContextoActivo() {
            if (!audioContexto) return false;
            if (audioContexto.state === 'suspended') {
                try { await audioContexto.resume(); } catch (e) {}
            }
            return audioContexto.state === 'running';
        }

        function aplicarGananciaNormalizada(valor) {
            if (!gainNormalizacion || !audioContexto) return;
            const t = audioContexto.currentTime;
            const ganancia = Math.max(0.001, Math.min(AUTO_VOL_GAIN_MAX, valor));
            gainNormalizacion.gain.cancelScheduledValues(t);
            const actual = Math.max(0.001, gainNormalizacion.gain.value);
            gainNormalizacion.gain.setValueAtTime(actual, t);
            gainNormalizacion.gain.exponentialRampToValueAtTime(ganancia, t + 3.0);
            notificarAutoVolAdmin(ganancia);
        }

        function notificarAutoVolAdmin(ganancia) {
            try {
                canalAdmin.send({
                    type: 'broadcast',
                    event: 'control',
                    payload: { accion: 'autovol', valor: ganancia }
                });
            } catch (e) {}
        }

        function iniciarNormalizacion() {
            detenerNormalizacion();
            medicionesRMS = [];

            if (gainNormalizacion && audioContexto) {
                const t = audioContexto.currentTime;
                gainNormalizacion.gain.cancelScheduledValues(t);
                gainNormalizacion.gain.setValueAtTime(1.0, t);
            }

            normInterval = setInterval(async () => {
                if (!isPlaying || !analizadorNorm || !gainNormalizacion || !audioContexto) return;
                if (!(await asegurarAudioContextoActivo())) return;

                const buffer = new Float32Array(analizadorNorm.fftSize);
                analizadorNorm.getFloatTimeDomainData(buffer);

                let sumaCuadrados = 0;
                for (let i = 0; i < buffer.length; i++) {
                    sumaCuadrados += buffer[i] * buffer[i];
                }
                const rms = Math.sqrt(sumaCuadrados / buffer.length);

                if (rms < 0.008) return;

                medicionesRMS.push(rms);
                if (medicionesRMS.length > 5) medicionesRMS.shift();
                const rmsPromedio = medicionesRMS.reduce((a, b) => a + b, 0) / medicionesRMS.length;

                const correccion = Math.max(AUTO_VOL_GAIN_MIN, Math.min(AUTO_VOL_GAIN_MAX, AUTO_VOL_TARGET_RMS / rmsPromedio));

                try {
                    aplicarGananciaNormalizada(correccion);
                } catch (e) {
                    console.warn('Auto-vol:', e);
                }
            }, 2000);
        }

        function detenerNormalizacion() {
            if (normInterval) { clearInterval(normInterval); normInterval = null; }
            medicionesRMS = [];
        }

        function conectarCadenaPrincipal(usarPitch) {
            source.connect(gainNormalizacion);
            gainNormalizacion.connect(analizadorNorm);
            analizadorNorm.connect(ecualizadorBajos);
            ecualizadorBajos.connect(ecualizadorMedios);
            ecualizadorMedios.connect(deEsser);
            deEsser.connect(ecualizadorBrillo);
            if (usarPitch && soundTouchNode) {
                ecualizadorBrillo.connect(soundTouchNode);
                soundTouchNode.connect(compressor);
            } else {
                ecualizadorBrillo.connect(compressor);
            }
            compressor.connect(gainFinal);
            gainFinal.connect(audioContexto.destination);
            console.log('[Audio] Cadena conectada:', usarPitch && soundTouchNode
                ? 'fuente→gain→analizador→EQ→SoundTouch→comp→out'
                : 'fuente→gain→analizador→EQ→comp→out');
        }

        function conectarCadenaAudio() {
            if (!source) {
                source = audioContexto.createMediaElementSource(player);
                console.log('[Audio] MediaElementSource creado (una sola vez)');
            }

            if (!gainNormalizacion) {
                gainNormalizacion = audioContexto.createGain();
                gainNormalizacion.gain.value = 1.0;
            }

            if (!analizadorNorm) {
                analizadorNorm = audioContexto.createAnalyser();
                analizadorNorm.fftSize = 4096;
                analizadorNorm.smoothingTimeConstant = 0.5;
            }

            if (!ecualizadorBajos) {
                ecualizadorBajos = audioContexto.createBiquadFilter();
                ecualizadorBajos.type = 'lowshelf';
                ecualizadorBajos.frequency.setValueAtTime(110, audioContexto.currentTime);
                ecualizadorBajos.gain.value = 1.2;
            }

            if (!ecualizadorMedios) {
                ecualizadorMedios = audioContexto.createBiquadFilter();
                ecualizadorMedios.type = 'peaking';
                ecualizadorMedios.frequency.setValueAtTime(2500, audioContexto.currentTime);
                ecualizadorMedios.Q.value = 0.85;
                ecualizadorMedios.gain.value = 1.0;
            }

            if (!deEsser) {
                deEsser = audioContexto.createBiquadFilter();
                deEsser.type = 'peaking';
                deEsser.frequency.setValueAtTime(5500, audioContexto.currentTime);
                deEsser.Q.value = 1.4;
                deEsser.gain.value = -1.8;
            }

            if (!ecualizadorBrillo) {
                ecualizadorBrillo = audioContexto.createBiquadFilter();
                ecualizadorBrillo.type = 'highshelf';
                ecualizadorBrillo.frequency.setValueAtTime(9000, audioContexto.currentTime);
                ecualizadorBrillo.gain.value = 0.4;
            }

            if (!soundTouchNode && SoundTouchNodeClass) {
                soundTouchNode = new SoundTouchNodeClass({ context: audioContexto });
                soundTouchNode.playbackRate.value = 1;
                soundTouchNode.pitchSemitones.value = semitonos;
            }

            player.preservesPitch = false;

            if (!compressor) {
                compressor = audioContexto.createDynamicsCompressor();
                compressor.threshold.value = -22.0;
                compressor.knee.value      = 10.0;
                compressor.ratio.value     = 3.0;
                compressor.attack.value    = 0.012;
                compressor.release.value   = 0.18;
            }

            if (!gainFinal) {
                gainFinal = audioContexto.createGain();
                gainFinal.gain.value = 1.0;
            }

            try {
                conectarCadenaPrincipal(true);
            } catch (e) {
                console.warn('[Audio] SoundTouch falló, cadena sin pitch:', e);
                soundTouchNode = null;
                try {
                    gainNormalizacion.disconnect();
                    analizadorNorm.disconnect();
                    ecualizadorBajos.disconnect();
                    ecualizadorMedios.disconnect();
                    deEsser.disconnect();
                    ecualizadorBrillo.disconnect();
                    compressor.disconnect();
                    gainFinal.disconnect();
                } catch (err) {}
                conectarCadenaPrincipal(false);
            }
        }

        async function iniciarAudio() {
            if (audioIniciado) {
                await asegurarAudioContextoActivo();
                return;
            }
            audioIniciado = true;

            player.crossOrigin = 'anonymous';

            audioContexto = new (window.AudioContext || window.webkitAudioContext)();

            try {
                await audioContexto.resume();
                console.log('[Audio] AudioContext activado:', audioContexto.state);
            } catch (e) {
                console.error('[Audio] No se pudo reanudar AudioContext:', e);
            }

            try {
                await registrarSoundTouch();
                console.log('[Audio] SoundTouch listo');
            } catch (e) {
                console.error('[Audio] No se pudo cargar SoundTouch:', e);
            }

            conectarCadenaAudio();
            player.addEventListener('playing', () => { asegurarAudioContextoActivo(); });

            if (audioContexto.state === 'suspended') {
                await audioContexto.resume();
            }
            console.log('[Audio] Estado final AudioContext:', audioContexto.state);
        }

        async function iniciarSistema() {
            wall.style.display = 'none';

            if (sistemaIniciado) return;
            sistemaIniciado = true;
            systemActive    = true;

            await iniciarAudio();
            buscarSiguienteCancion();
        }

        wall.addEventListener('click', () => {
            iniciarSistema().catch(e => console.error('[Audio] iniciarSistema:', e));
        });

        // ── MANEJO DE ERRORES DE VIDEO ────────────────────────────────────
        function manejarErrorVideo(solicitud) {
            const err = player.error;
            if (!err) return;

            if ((err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED || err.code === 4) && !intentoExtensionAlterna) {
                intentoExtensionAlterna = true;
                player.src = `videos_locales/${solicitud.cancion_info}.MP4`;
                player.load();
                try {
                    const p = player.play();
                    if (p && typeof p.catch === 'function') p.catch(e => console.warn('Reintentando MP4 mayúscula...', e));
                } catch (e) {}
                return;
            }

            const esCritico = err.code === 4 || err.code === 3
                || err.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED
                || err.code === MediaError.MEDIA_ERR_DECODE;

            if (esCritico) {
                console.error('Error crítico:', err.code);
                marcarComoCompletada(solicitud.id);
            }
        }

        // ── CONTADOR DE TIEMPO ────────────────────────────────────────────
        player.addEventListener('timeupdate', () => {
            if (!isPlaying || !player.duration || isNaN(player.duration)) return;
            const t = player.currentTime;
            const d = player.duration;
            timeCounter.innerText = `${formatTiempo(t)} / ${formatTiempo(d)} (Restan: -${formatTiempo(d - t)})`;
        });

        // ── BÚSQUEDA Y COLA ───────────────────────────────────────────────
        async function buscarSiguienteCancion() {
            if (!systemActive || isPlaying) return;

            const { data, error } = await supabaseClient
                .from('Solicitudes')
                .select('*')
                .eq('estado', 'pendiente')
                .order('id', { ascending: true })
                .limit(1);

            if (error || !data || data.length === 0) {
                lobbyScreen.style.display = 'flex';
                lobbyMessage.innerText    = "ESPERANDO SOLICITUDES...";
                singerName.classList.add('hidden');
                countdownText.classList.add('hidden');
                player.style.display = 'none';
                timeCounter.classList.add('hidden');
                return;
            }

            iniciarCuentaRegresiva(data[0]);
        }

        function iniciarCuentaRegresiva(solicitud) {
            isPlaying = true;
            idActual  = solicitud.id;
            let segundos = 5;

            resetTono(true);

            lobbyScreen.style.display  = 'flex';
            lobbyMessage.innerText     = `PRÓXIMO TEMA:\n${solicitud.cancion_info}`;
            singerName.innerText       = `🎤 LA CANTA: ${solicitud.nombre_usuario.toUpperCase()}`;
            singerName.classList.remove('hidden');
            countdownText.innerText = segundos;
            countdownText.classList.remove('hidden');

            const intervalo = setInterval(() => {
                segundos--;
                if (segundos > 0) {
                    countdownText.innerText = segundos;
                } else {
                    clearInterval(intervalo);
                    countdownText.classList.add('hidden');
                    reproducirVideo(solicitud);
                }
            }, 1000);
        }

        async function reproducirVideo(solicitud) {
            intentoExtensionAlterna = false;

            // UI
            lobbyScreen.style.display = 'none';
            player.style.display      = 'block';
            timeCounter.classList.remove('hidden');

            resetTono(true);

            await asegurarAudioContextoActivo();
            iniciarNormalizacion();

            const nombre = solicitud.cancion_info;
            player.crossOrigin = 'anonymous';
            player.src = `videos_locales/${nombre}.mp4`;
            player.load();

            try {
                await asegurarAudioContextoActivo();
                await player.play();
                resetTono(true);
            } catch {
                if (!intentoExtensionAlterna) {
                    intentoExtensionAlterna = true;
                    player.src = `videos_locales/${nombre}.MP4`;
                    player.load();
                    try {
                        await player.play();
                        resetTono(true);
                    } catch (err) {
                        console.warn('Esperando buffer o interacción...', err);
                    }
                }
            }

            player.onended = () => { if (idActual === solicitud.id) marcarComoCompletada(solicitud.id); };
            player.onerror = () => { if (idActual === solicitud.id) manejarErrorVideo(solicitud); };
        }

        async function marcarComoCompletada(id) {
            if (!id) return;

            await supabaseClient.from('Solicitudes').update({ estado: 'completada' }).eq('id', id);

            isPlaying = false;
            idActual  = null;

            // Limpiar UI
            timeCounter.classList.add('hidden');

            // Limpiar audio
            detenerNormalizacion();
            resetTono(true);

            player.onended = null;
            player.onerror = null;
            player.src = "";

            buscarSiguienteCancion();
        }

        // ── SUPABASE: NUEVAS SOLICITUDES ──────────────────────────────────
        supabaseClient.channel('cambios-db')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'Solicitudes' }, () => {
                buscarSiguienteCancion();
            })
            .subscribe();

        // ── SUPABASE: COMANDOS DEL ADMIN ──────────────────────────────────
        canalAdmin
            .on('broadcast', { event: 'control' }, ({ payload }) => {
                switch (payload.accion) {

                    case 'pausa':
                        if (player.paused) {
                            try { const p = player.play(); if (p?.catch) p.catch(() => {}); } catch (e) {}
                        } else {
                            player.pause();
                        }
                        break;

                    case 'reiniciar':
                        if (isPlaying) {
                            player.currentTime = 0;
                            try { const p = player.play(); if (p?.catch) p.catch(() => {}); } catch (e) {}
                        }
                        break;

                    case 'saltar':
                        if (isPlaying) marcarComoCompletada(idActual);
                        break;

                    case 'efecto':
                        if (payload.valor) reproducirEfecto(payload.valor);
                        break;

                    // Comandos de tono (enviables desde el panel admin)
                    case 'tono':
                        if (payload.delta !== undefined) cambiarTono(payload.delta);
                        break;

                    case 'reset_tono':
                        resetTono(false);
                        break;
                }
            })
            .subscribe();
    </script>
</body>
</html>
