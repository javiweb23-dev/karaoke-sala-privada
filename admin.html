<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control Mágnum - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .btn-tono { transition: transform 0.08s, background 0.15s; }
        .btn-tono:active { transform: scale(0.92); }
        #gainBar { transition: width 2.5s ease, background-color 1s ease; }
        @keyframes tonoFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .tono-flash { animation: tonoFlash 0.25s ease; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col items-center font-sans p-6 py-8">

    <div class="max-w-md w-full bg-zinc-900 border border-zinc-800 rounded-2xl p-6 shadow-2xl flex flex-col gap-6">
        <header class="flex items-center gap-4 pb-4 border-b border-zinc-800">
            <img src="logo.png" alt="Mi Karaoke Latino" class="h-14 w-auto flex-shrink-0 object-contain">
            <div class="min-w-0">
                <h1 class="text-xl font-black text-amber-400 tracking-wide leading-tight">CONSOLE ADMIN</h1>
                <p class="text-sm text-zinc-500 mt-0.5">Control Remoto de TV Principal</p>
            </div>
        </header>

        <div class="text-left">
            <h2 class="text-zinc-400 text-xs font-bold mb-2 uppercase tracking-wider">Canciones en espera</h2>
            <div class="max-h-56 overflow-y-auto rounded-xl border border-zinc-800 bg-zinc-950/50 p-3">
                <div id="adminQueue" class="flex flex-col gap-1.5 text-sm text-zinc-300">
                    <p class="text-zinc-600 italic text-sm">Cargando cola...</p>
                </div>
            </div>
        </div>

        <div>
            <h2 class="text-zinc-400 text-xs font-bold mb-3 uppercase tracking-wider text-center">Control de audio</h2>
            <div id="controlPanel" class="bg-zinc-950/95 backdrop-blur-sm border border-zinc-700/60 rounded-2xl shadow-2xl shadow-black/70 overflow-hidden">
                <div class="flex items-center gap-1.5 px-3 pt-3 pb-2 flex-wrap justify-center">
                    <span class="text-zinc-500 text-[10px] font-black tracking-widest uppercase w-14">Tono</span>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-blue-950 border border-zinc-700 hover:border-blue-700 rounded-lg text-[11px] text-blue-400 font-black" onclick="enviarTono(-3)">-3</button>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-blue-950 border border-zinc-700 hover:border-blue-700 rounded-lg text-[11px] text-blue-400 font-black" onclick="enviarTono(-2)">-2</button>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-blue-950 border border-zinc-700 hover:border-blue-700 rounded-lg text-[11px] text-blue-400 font-black" onclick="enviarTono(-1)">-1</button>
                    <div id="tonoDisplay" class="px-3 py-1 bg-zinc-900 border border-zinc-600 rounded-lg text-amber-400 text-sm font-black min-w-[3.5rem] text-center tracking-wide">0</div>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-rose-950 border border-zinc-700 hover:border-rose-700 rounded-lg text-[11px] text-rose-400 font-black" onclick="enviarTono(1)">+1</button>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-rose-950 border border-zinc-700 hover:border-rose-700 rounded-lg text-[11px] text-rose-400 font-black" onclick="enviarTono(2)">+2</button>
                    <button type="button" class="btn-tono px-2 py-1 bg-zinc-800/80 hover:bg-rose-950 border border-zinc-700 hover:border-rose-700 rounded-lg text-[11px] text-rose-400 font-black" onclick="enviarTono(3)">+3</button>
                    <button type="button" class="btn-tono ml-1 px-2.5 py-1 bg-zinc-800/80 hover:bg-zinc-700 border border-zinc-600 rounded-lg text-zinc-400 hover:text-white text-xs font-black" onclick="enviarResetTono()" title="Resetear tono">↺</button>
                </div>
                <div class="mx-3 border-t border-zinc-800"></div>
                <div class="flex items-center gap-2 px-3 py-2">
                    <span class="text-zinc-500 text-[10px] font-black tracking-widest uppercase w-14">Auto vol</span>
                    <div class="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden min-w-[80px]">
                        <div id="gainBar" class="h-full bg-emerald-500 rounded-full" style="width: 50%"></div>
                    </div>
                    <span id="gainLabel" class="text-[10px] text-zinc-500 font-mono w-12 text-right">TV</span>
                </div>
                <div class="px-3 pb-2 text-[9px] text-zinc-600 font-mono tracking-wide text-center">
                    Ajuste remoto de tono en la TV
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <button onclick="enviarComando('pausa')" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-4 rounded-xl text-lg border border-zinc-700 active:scale-95 transition-all">
                ⏯️ PAUSAR / CONTINUAR
            </button>

            <button onclick="enviarComando('reiniciar')" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl text-lg active:scale-95 transition-all shadow-lg shadow-blue-600/20">
                🔄 COMENZAR DE NUEVO
            </button>

            <button onclick="enviarComando('saltar')" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-4 rounded-xl text-lg active:scale-95 transition-all shadow-lg shadow-amber-500/20">
                ⏭️ SALTAR A LA SIGUIENTE
            </button>
        </div>

        <div>
            <h2 class="text-zinc-400 text-xs font-bold mb-3 uppercase tracking-wider text-center">Efectos Especiales</h2>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="enviarEfecto('aplausos')" class="bg-emerald-900/40 hover:bg-emerald-800/60 border border-emerald-700/50 text-emerald-300 font-bold py-3.5 px-3 rounded-xl text-sm active:scale-95 transition-all shadow-lg shadow-emerald-900/20">
                    👏 Aplausos
                </button>
                <button onclick="enviarEfecto('buuu')" class="bg-red-900/40 hover:bg-red-800/60 border border-red-700/50 text-red-300 font-bold py-3.5 px-3 rounded-xl text-sm active:scale-95 transition-all shadow-lg shadow-red-900/20">
                    👎 Buuu
                </button>
                <button onclick="enviarEfecto('corneta')" class="bg-violet-900/40 hover:bg-violet-800/60 border border-violet-700/50 text-violet-300 font-bold py-3.5 px-3 rounded-xl text-sm active:scale-95 transition-all shadow-lg shadow-violet-900/20">
                    📯 Corneta
                </button>
                <button onclick="enviarEfecto('chacal')" class="bg-amber-900/40 hover:bg-amber-800/60 border border-amber-700/50 text-amber-300 font-bold py-3.5 px-3 rounded-xl text-sm active:scale-95 transition-all shadow-lg shadow-amber-900/20">
                    🎺 Chacal
                </button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mefrjbmjfdphdqndpzcw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_Xfq71bq0xH8DQ62OHekwCQ_B5dAPsz8";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const channel = supabaseClient.channel('admin-commands');
        const tonoDisplay = document.getElementById('tonoDisplay');
        let semitonosAdmin = 0;

        function actualizarDisplayTono() {
            const texto = semitonosAdmin > 0 ? `+${semitonosAdmin}` : `${semitonosAdmin}`;
            tonoDisplay.innerText = texto;
            tonoDisplay.className = tonoDisplay.className.replace(/text-(amber|blue|rose)-\d+/g, '');
            if (semitonosAdmin > 0) tonoDisplay.classList.add('text-rose-400');
            else if (semitonosAdmin < 0) tonoDisplay.classList.add('text-blue-400');
            else tonoDisplay.classList.add('text-amber-400');
            tonoDisplay.classList.remove('tono-flash');
            void tonoDisplay.offsetWidth;
            tonoDisplay.classList.add('tono-flash');
        }

        function enviarTono(delta) {
            semitonosAdmin = Math.max(-6, Math.min(6, semitonosAdmin + delta));
            actualizarDisplayTono();
            channel.send({
                type: 'broadcast',
                event: 'control',
                payload: { accion: 'tono', delta: delta }
            }).then(() => {
                console.log(`Tono ${delta > 0 ? '+' : ''}${delta} enviado a la TV.`);
            });
        }

        function enviarResetTono() {
            semitonosAdmin = 0;
            actualizarDisplayTono();
            channel.send({
                type: 'broadcast',
                event: 'control',
                payload: { accion: 'reset_tono' }
            }).then(() => {
                console.log('Reset de tono enviado a la TV.');
            });
        }

        function enviarComando(accion) {
            if (accion === 'saltar') {
                semitonosAdmin = 0;
                actualizarDisplayTono();
            }
            channel.send({
                type: 'broadcast',
                event: 'control',
                payload: { accion: accion }
            }).then(() => {
                console.log(`Comando '${accion}' enviado a la TV.`);
            });
        }

        function enviarEfecto(sonido) {
            channel.send({
                type: 'broadcast',
                event: 'control',
                payload: { accion: 'efecto', valor: sonido }
            }).then(() => {
                console.log(`Efecto '${sonido}' enviado a la TV.`);
            });
        }

        async function actualizarCola() {
            const { data } = await supabaseClient
                .from('Solicitudes')
                .select('cancion_info, nombre_usuario')
                .eq('estado', 'pendiente')
                .order('id', { ascending: true });

            const adminQueue = document.getElementById('adminQueue');
            if (!data || data.length === 0) {
                adminQueue.innerHTML = `<p class="text-zinc-600 italic text-sm">No hay canciones en espera.</p>`;
                return;
            }

            adminQueue.innerHTML = data.map((s, i) =>
                `<div class="truncate py-0.5"><span class="text-amber-500 font-bold mr-1">${i + 1}.</span>${s.cancion_info} <span class="text-zinc-500 text-xs">(${s.nombre_usuario})</span></div>`
            ).join('');
        }

        channel.subscribe();
        supabaseClient.channel('admin-queue-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'Solicitudes' }, actualizarCola).subscribe();

        actualizarCola();
    </script>
</body>
</html>
